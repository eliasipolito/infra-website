name: "Terraform CI/CD"

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar terraform apply?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      plan_destroy:
        description: 'Gerar plano de destruição (Plan Destroy)?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      destroy:
        description: 'Executar terraform destroy?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write # Required for requesting the JWT (OIDC)
  contents: read # Required for actions/checkout

jobs:
  terraform: 
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"   
        uses: aws-actions/configure-aws-credentials@v6.1.1  
        with:  
          role-to-assume: arn:aws:iam::461546078282:role/githubaction #verificar aws credentials no aws marketplace >> github action workflows  
          aws-region: us-east-2   

      - name: HashiCorp - Setup Terraform  
        uses: hashicorp/setup-terraform@v3  
        with:
          terraform_wrapper: false
    
      - name: Terraform Init  
        run: terraform init  
    
      - name: Terraform Validate  
        run: terraform validate  

  # --- DEPLOYMENT FLUID ---
      - name: Terraform Plan  
        if: github.event.inputs.plan_destroy != 'true' && github.event.inputs.destroy != 'true'
        run: terraform plan -out=tfplan.tfout  

      - name: Terraform Apply  
        if: github.event.inputs.apply == 'true' && github.event.inputs.plan_destroy != 'true' && github.event.inputs.destroy != 'true'
        run: terraform apply -auto-approve tfplan.tfout  

      # --- DESTROY FLUID ---
      - name: Plan Destroy  
        if: github.event.inputs.plan_destroy == 'true'
        run: terraform plan -destroy -out=tfdestroy.tfout  

      - name: Terraform Destroy  
        if: github.event.inputs.destroy == 'true'
        run: terraform destroy -auto-approve