name: "Terraform CI/CD"

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar terraform apply?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write # Required for requesting the JWT (OIDC)
  contents: read  # Required for actions/checkout

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials" # verificar no marketplace aws credencial
        uses: aws-actions/configure-aws-credentials@v6.1.1 # // // // //
       
        with:
          aws-region: us-east-2 #verificar aws credentials no aws marketplace >> github action workflows
          role-to-assume: aarn:aws:iam::461546078282:role/infra #verificar aws credentials no aws marketplace >> github action workflows

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan.tfout
        if: github.event.inputs.destroy == 'true'